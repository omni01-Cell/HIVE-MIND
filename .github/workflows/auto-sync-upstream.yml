name: Auto Sync Upstream to Fork

on:
  schedule:
    - cron: '0 * * * *' # S'exécute toutes les heures
  workflow_dispatch: # Permet le déclenchement manuel

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-from-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4.2.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.UPSTREAM_PAT || secrets.GITHUB_TOKEN }}

      - name: Fetch upstream changes
        run: |
          git remote add upstream https://github.com/omni01-Cell/HIVE-MIND.git
          git fetch upstream main

      - name: Check if behind upstream
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "Le fork est en retard de $BEHIND commit(s)."
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT

      - name: Create Sync Branch and PR
        if: steps.check.outputs.behind > 0
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_PAT || secrets.GITHUB_TOKEN }}
        run: |
          SYNC_BRANCH="sync-upstream-main"
          
          # Configurer l'identité git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Créer une branche de synchronisation à partir de notre main locale (qui contient nos workflows)
          git checkout -B "$SYNC_BRANCH" main
          
          # Fusionner les modifications de l'upstream (ceci va importer son code)
          git merge upstream/main -m "Merge upstream changes" --allow-unrelated-histories || echo "Des conflits potentiels ont été rencontrés lors de la fusion."
          
          # Restaurer et préserver notre dossier .github/ local à partir de main
          git checkout main -- .github/ || true
          
          # Valider la version finale
          git add .github/
          git commit -am "chore: preserve local .github configuration during sync" || echo "Pas de modifications de synchronisation à valider."
          
          # Pousser la branche de synchronisation sur le fork
          git push origin "$SYNC_BRANCH" --force
          
          # Vérifier s'il y a un diff réel par rapport à main après exclusion de .github/
          if git diff --quiet main.."$SYNC_BRANCH"; then
            echo "Aucune modification de code à intégrer (après préservation de .github/). Pas besoin de Pull Request."
            exit 0
          fi

          # Vérifier si une PR existe déjà pour cette branche propre
          PR_EXISTS=$(gh pr list --head "$SYNC_BRANCH" --json number --jq '.[0].number')

          if [ -z "$PR_EXISTS" ]; then
            echo "Création d'une nouvelle Pull Request de synchronisation..."
            gh pr create \
              --title "Synchronisation Upstream" \
              --body "Cette Pull Request intègre automatiquement les nouveaux commits du dépôt parent ($BEHIND commit(s) de retard) tout en préservant le dossier .github/ local du fork." \
              --base main \
              --head "$SYNC_BRANCH"
          else
            echo "La Pull Request de synchronisation #$PR_EXISTS existe déjà. Elle a été mise à jour automatiquement."
          fi



