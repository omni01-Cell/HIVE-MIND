name: Auto PR to Upstream

on:
  push:
    branches-ignore:
      - main

jobs:
  create-pr-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.UPSTREAM_PAT || secrets.GITHUB_TOKEN }}

      - name: Create or update PR
        env:
          # Utilise le Personal Access Token (PAT) stocké dans les secrets du fork
          GH_TOKEN: ${{ secrets.UPSTREAM_PAT || secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_REPO="omni01-Cell/HIVE-MIND"
          FORK_OWNER="leandre755"
          BRANCH_NAME="${{ github.ref_name }}"
          PR_BRANCH="pr-clean-$BRANCH_NAME"

          # Configurer l'identité git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Ajouter l'upstream et récupérer main
          git remote add upstream https://github.com/omni01-Cell/HIVE-MIND.git
          git fetch upstream main

          # Créer ou réinitialiser la branche de PR propre
          git checkout -B "$PR_BRANCH"

          # Réinitialiser le dossier .github/ à l'état de l'upstream
          if git rev-parse --verify upstream/main:.github >/dev/null 2>&1; then
            git checkout upstream/main -- .github/
          else
            git rm -rf .github/ || rm -rf .github/
          fi

          # Valider le nettoyage
          git commit -am "chore: reset workflows to upstream state for PR compatibility" || echo "Pas de changements de workflows à valider."

          # Pousser la branche propre
          git push origin "$PR_BRANCH" --force || echo "Push failed, ignoring..."

          # Vérifier si une PR existe déjà pour cette branche propre
          PR_EXISTS=$(gh pr list --repo "$UPSTREAM_REPO" --head "$FORK_OWNER:$PR_BRANCH" --json number --jq '.[0].number')

          if [ -z "$PR_EXISTS" ]; then
            echo "Création d'une nouvelle Pull Request de $PR_BRANCH vers $UPSTREAM_REPO..."
            gh pr create \
              --repo "$UPSTREAM_REPO" \
              --head "$FORK_OWNER:$PR_BRANCH" \
              --base main \
              --title "Auto PR: $BRANCH_NAME" \
              --body "Cette Pull Request a été générée automatiquement et expurgée des configurations locales du dossier .github/." || echo "PR creation failed"
          else
            echo "La Pull Request #$PR_EXISTS existe déjà."
          fi

